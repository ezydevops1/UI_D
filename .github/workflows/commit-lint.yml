name: Commit Lint

on:
  pull_request:
    branches: [main]   # run on PRs to main

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      # Get all commits in the PR
      - name: Get commits in PR
        id: commits
        run: |
          COMMITS=$(jq -r '.pull_request.commits' $GITHUB_EVENT_PATH)
          echo "commit_count=$COMMITS" >> $GITHUB_ENV

      # Install commitlint CLI + conventional config
      - name: Setup Commitlint
        run: |
          npm install --global @commitlint/{cli,config-conventional}

      # Validate commits in PR
      - name: Validate commit messages
        run: |
          git fetch origin main
          COMMITS=$(git log origin/main..HEAD --pretty=format:"%s")
          echo "$COMMITS" | commitlint --extends @commitlint/config-conventional
